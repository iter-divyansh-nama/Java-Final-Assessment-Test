server.port=9091
spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Enable discovery (UPDATED KEY)
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true

# ROUTES (UPDATED KEYS)

spring.cloud.gateway.server.webflux.routes[0].id=order-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://order-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/orders/**

spring.cloud.gateway.server.webflux.routes[1].id=payment-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://payment-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/payments/**

spring.cloud.gateway.server.webflux.routes[2].id=delivery-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://delivery-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/delivery/**

spring.cloud.gateway.server.webflux.routes[3].id=shipping-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://shipping-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/shipping/**

spring.cloud.gateway.server.webflux.routes[4].id=notification-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://notification-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/notifications/**